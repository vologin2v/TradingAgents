services:
  tradingagents:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
      - http_proxy=http://host.docker.internal:10809
      - https_proxy=http://host.docker.internal:10809
      - HTTP_PROXY=http://host.docker.internal:10809
      - HTTPS_PROXY=http://host.docker.internal:10809
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    ports:
      - "8000:8000" 
    tty: true
    stdin_open: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
      - http_proxy=http://host.docker.internal:10809
      - https_proxy=http://host.docker.internal:10809
      - HTTP_PROXY=http://host.docker.internal:10809
      - HTTPS_PROXY=http://host.docker.internal:10809
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:

